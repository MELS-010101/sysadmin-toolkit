<< 'WORKFLOW_EOF'
name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: ls -la src/linux/ src/macos/
      - run: shellcheck src/linux/*.sh --severity=error
      - run: shellcheck src/macos/*.sh --severity=error
WORKFLOW_EOF