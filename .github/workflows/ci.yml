  publish-nuget:
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - run: mkdir -p dist
        working-directory: packaging/nuget
      - run: dotnet pack sysadmin-toolkit.nuspec -c Release -o dist/
        working-directory: packaging/nuget
      - run: dotnet nuget push dist/*.nupkg --source "https://nuget.pkg.github.com/MELS-010101" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate