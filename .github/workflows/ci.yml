{
  "name": "@MELS-010101/sysadmin-toolkit",
  "version": "1.0.0",
  "description": "Cross-platform CLI automation toolkit",
  "bin": {
    "sat": "../../bin/sat"
  },
  "files": [
    "../../bin",
    "../../src",
    "../../lib"
  ],
  "repository": {
    "type": "git",
    "url": "https://github.com/MELS-010101/sysadmin-toolkit.git"
  },
  "license": "MIT",
  "publishConfig": {
    "@MELS-010101:registry": "https://npm.pkg.github.com/"
  }
}
'@ | Set-Content -Path "packaging\npm\package.json" -Encoding UTF8
}

if (!(Test-Path "packaging\nuget\sysadmin-toolkit.nuspec")) {
    New-Item -ItemType Directory -Path "packaging\nuget" -Force
    @'
<?xml version="1.0" encoding="utf-8"?>
<package xmlns="http://schemas.microsoft.com/packaging/2013/05/nuspec.xsd">
  <metadata>
    <id>SysAdmin-Toolkit</id>
    <version>1.0.0</version>
    <title>SysAdmin-Toolkit</title>
    <authors>MELS-010101</authors>
    <requireLicenseAcceptance>false</requireLicenseAcceptance>
    <license type="expression">MIT</license>
    <description>Cross-platform CLI automation toolkit</description>
    <repository type="git" url="https://github.com/MELS-010101/sysadmin-toolkit.git" />
  </metadata>
</package>
'@ | Set-Content -Path "packaging\nuget\sysadmin-toolkit.nuspec" -Encoding UTF8
}