name: CI/CD Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@mels-010101'

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - run: |
          mkdir -p dist
          dotnet pack packaging/nuget/sysadmin-toolkit.nuspec -c Release -o dist/

      - run: dotnet nuget push dist/*.nupkg --source "https://nuget.pkg.github.com/MELS-010101" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate