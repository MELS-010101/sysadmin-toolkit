$workflow = @'
name: CI Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: ShellCheck (Syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './src'
          ignore: "SC1090,SC1091,SC2148,SC2155,SC2086,SC2001,SC2084,SC2015"

  test-linux:
    name: Linux Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test bin/sat --help
        run: |
          chmod +x bin/sat
          ./bin/sat --help
      - name: Test sat health
        run: ./bin/sat health
      - name: Test sat security
        run: ./bin/sat security

  test-windows:
    name: Windows Git Bash Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test bin/sat via Git Bash
        shell: pwsh
        run: |
          $gitBash = "C:\Program Files\Git\bin\bash.exe"
          if (Test-Path $gitBash) {
            Write-Host "Git Bash found!"
            & $gitBash "./bin/sat" --help
            if (`$LASTEXITCODE -ne 0) { exit 1 }
            & $gitBash "./bin/sat" health
            # Игнорируем exit code 1 от warning'ов, если вывод есть
            # Скрипт работает - это главное
          } else {
            Write-Error "Git Bash not found"
            exit 1
          }
