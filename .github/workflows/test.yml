name: CI Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: ShellCheck (Syntax)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './src'
          ignore_names: "SC1090 SC1091 SC2148 SC2155 SC2086 SC2001 SC2084 SC2015 SC2034 SC2088"

  test-linux:
    name: Linux Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test bin/sat --help
        run: |
          chmod +x bin/sat
          ./bin/sat --help
      - name: Test sat health
        run: ./bin/sat health
      - name: Test sat security
        run: ./bin/sat security

  test-windows:
    name: Windows Git Bash Tests
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Test bin/sat via Git Bash
        shell: pwsh
        run: |
          $gitBash = "C:\Program Files\Git\bin\bash.exe"
          if (Test-Path $gitBash) {
            Write-Host "Git Bash found!"
            & $gitBash "./bin/sat" --help
            & $gitBash "./bin/sat" health
            Write-Host "Windows tests completed (warnings allowed)"
          } else {
            Write-Error "Git Bash not found"
            exit 1
          }
